{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Island Escape Luxury Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-header">
      <a href="index.html" class="nav-logo" style="justify-content: center; margin-bottom: 1rem;">
        <i class="fas fa-umbrella-beach"></i>
        <span>ISLAND<span style="color:#00B4D8;">ESCAPE</span></span>
      </a>
      <h2>Welcome Back</h2>
      <p style="color:#6C757D; font-size:0.9rem; margin-top:0.3rem;">Sign in to access your luxury itineraries and member rewards.</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="alex.wright@luxuryescapes.com" required value="alex.wright@luxuryescapes.com" />
      </div>

      <div class="form-group" style="position:relative;">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required value="password123" />
        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('login-password', this)"></i>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; font-size:0.85rem;">
        <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
          <input type="checkbox" checked /> Remember Me
        </label>
        <a href="#" style="color:#0077B6; font-weight:600;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; padding:0.9rem;">
        Sign In <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <div style="text-align:center; margin-top:1.75rem; font-size:0.9rem; color:#6C757D;">
      Don't have a luxury member account? <a href="register.html" style="color:#0077B6; font-weight:700;">Create Account</a>
    </div>
  </div>

  <script src="{% static 'js/script.js' %}"></script>
  <script>
    function togglePasswordVisibility(fieldId, icon) {
      const input = document.getElementById(fieldId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash password-toggle';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye password-toggle';
      }
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      showToast('Welcome back, Alexander!', 'success');
      setTimeout(() => window.location.href = 'customer_dashboard.html', 1000);
    });
  </script>
</body>
</html>
